<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Manage Products | Selene Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root{--sans:'Inter',sans-serif;--serif:'Playfair Display',serif;--warm:#C4956A;--text:#1A1A18;--muted:#888;--border:#E8E4DF;--bg:#F9F7F4;--radius:10px;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
        /* header */
        .admin-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:white;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
        .header-left{display:flex;align-items:center;gap:.75rem;}
        .header-wordmark{font-family:var(--serif);font-size:1.1rem;}
        .header-divider{color:var(--muted);}
        .header-subtitle{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
        .header-right{display:flex;align-items:center;gap:.75rem;}
        .header-link{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.35rem .9rem;border-radius:2rem;transition:all .15s;}
        .header-link:hover{border-color:var(--warm);color:var(--warm);}
        .header-badge{background:var(--text);color:white;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:2rem;}
        /* status screens */
        main{max-width:1280px;margin:0 auto;padding:2.5rem 2rem 5rem;}
        .status-screen{display:none;min-height:60vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:4rem 2rem;}
        .status-screen.active{display:flex;}
        .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--warm);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 2rem;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .status-icon{font-size:3rem;margin-bottom:1.5rem;}
        .status-title{font-family:var(--serif);font-size:1.8rem;font-style:italic;margin-bottom:.75rem;}
        .status-body{font-size:.88rem;color:var(--muted);max-width:420px;line-height:1.7;margin-bottom:2rem;}
        .btn-primary{padding:.75rem 1.75rem;background:var(--text);color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;gap:.5rem;}
        .btn-primary:hover{opacity:.85;}
        .btn-secondary{padding:.65rem 1.5rem;background:white;color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:.78rem;font-weight:500;cursor:pointer;transition:border-color .15s;}
        .btn-secondary:hover{border-color:var(--warm);}
        .setup-input{width:100%;max-width:420px;padding:.6rem .85rem;border:1px solid var(--border);border-radius:7px;font-family:monospace;font-size:.8rem;color:var(--text);background:var(--bg);margin-bottom:.75rem;outline:none;}
        .setup-input:focus{border-color:var(--warm);}
        /* grid */
        #state-grid{display:none;}
        #state-grid.active{display:block;}
        .grid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem;}
        .grid-title{font-family:var(--serif);font-size:1.5rem;font-style:italic;}
        .grid-meta{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:1rem;}
        .filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.75rem;}
        .filter-btn{padding:.4rem 1rem;border:1px solid var(--border);border-radius:2rem;background:white;font-family:var(--sans);font-size:.72rem;cursor:pointer;transition:all .15s;color:var(--muted);}
        .filter-btn.active{background:var(--text);color:white;border-color:var(--text);}
        .filter-btn:hover:not(.active){border-color:var(--warm);color:var(--warm);}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1rem;}
        /* product card */
        .product-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .12s,box-shadow .12s,opacity .2s;}
        .product-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.07);}
        .product-card.saving,.product-card.deleting{opacity:.3;pointer-events:none;}
        .card-img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--bg);}
        .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
        .card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--border);}
        .card-id-badge{position:absolute;top:.5rem;left:.5rem;background:rgba(26,26,24,.72);color:white;font-size:.58rem;padding:.15rem .45rem;border-radius:2rem;letter-spacing:.06em;}
        .card-variant-badge{position:absolute;top:.5rem;right:.5rem;background:rgba(196,149,106,.85);color:white;font-size:.55rem;padding:.15rem .45rem;border-radius:2rem;letter-spacing:.05em;}
        .card-body{padding:.7rem .75rem .5rem;}
        .card-cat{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--warm);margin-bottom:.2rem;}
        .card-brand{font-size:.72rem;font-weight:600;line-height:1.3;}
        .card-name{font-size:.68rem;color:var(--muted);line-height:1.3;margin-top:.1rem;}
        .card-footer{padding:0 .75rem .75rem;display:flex;gap:.5rem;}
        .edit-btn{flex:1;padding:.42rem;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text);font-family:var(--sans);font-size:.68rem;font-weight:500;cursor:pointer;transition:all .12s;}
        .edit-btn:hover{border-color:var(--warm);color:var(--warm);}
        .delete-btn{flex:1;padding:.42rem;border:1px solid #F0D0D0;border-radius:6px;background:#FFF8F8;color:#C03030;font-family:var(--sans);font-size:.68rem;font-weight:500;cursor:pointer;transition:all .12s;}
        .delete-btn:hover{background:#C03030;color:white;border-color:#C03030;}
        /* delete confirm modal */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,24,.48);z-index:200;align-items:center;justify-content:center;}
        .modal-overlay.open{display:flex;}
        .modal-box{background:white;border-radius:12px;padding:2rem;max-width:400px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.18);animation:modal-in .18s ease;}
        @keyframes modal-in{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-title{font-family:var(--serif);font-size:1.3rem;margin-bottom:.75rem;}
        .modal-body{font-size:.84rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem;}
        .modal-actions{display:flex;gap:.75rem;justify-content:flex-end;}
        .btn-danger{padding:.65rem 1.5rem;background:#C03030;color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
        .btn-danger:hover{opacity:.85;}
        /* edit drawer */
        .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,24,.4);z-index:100;}
        .drawer-overlay.open{display:block;}
        .edit-drawer{position:fixed;top:0;right:0;bottom:0;width:min(620px,100vw);background:white;box-shadow:-12px 0 40px rgba(0,0,0,.14);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s ease;}
        .edit-drawer.open{transform:translateX(0);}
        .drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0;}
        .drawer-title{font-family:var(--serif);font-size:1.15rem;font-style:italic;}
        .drawer-hd-right{display:flex;align-items:center;gap:.75rem;}
        .drawer-close-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:.25rem .4rem;border-radius:4px;line-height:1;}
        .drawer-close-btn:hover{color:var(--text);}
        .drawer-body{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;}
        .drawer-ft{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;align-items:center;flex-shrink:0;}
        .drawer-spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--warm);border-radius:50%;animation:spin .9s linear infinite;display:none;flex-shrink:0;}
        /* drawer form fields */
        .d-section{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600;padding-bottom:.65rem;border-bottom:1px solid var(--border);}
        .d-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
        .d-fg{display:flex;flex-direction:column;gap:.32rem;}
        .d-label{font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
        .d-input,.d-select,.d-textarea{width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:.82rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;}
        .d-input:focus,.d-select:focus,.d-textarea:focus{border-color:var(--warm);background:white;}
        .d-textarea{resize:vertical;min-height:72px;line-height:1.5;}
        /* variant cards in drawer */
        .d-bulk-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:1.1rem;text-align:center;cursor:pointer;font-size:.75rem;color:var(--muted);line-height:1.6;transition:border-color .15s,background .15s;}
        .d-bulk-drop:hover,.d-bulk-drop.drag-over{border-color:var(--warm);background:#FBF8F5;}
        .d-variant-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:.85rem;margin-top:.75rem;}
        .d-vc{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
        .d-vc-thumb{aspect-ratio:3/4;overflow:hidden;cursor:pointer;background:#ece8e2;display:flex;align-items:center;justify-content:center;position:relative;}
        .d-vc-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
        .d-vc-thumb .d-vc-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);color:white;font-size:.65rem;text-align:center;padding:.5rem;opacity:0;transition:opacity .2s;}
        .d-vc-thumb:hover .d-vc-hint{opacity:1;}
        .d-vc-empty{display:flex;flex-direction:column;align-items:center;gap:.4rem;font-size:.7rem;color:var(--muted);pointer-events:none;}
        .d-vc-fields{padding:.6rem;display:flex;flex-direction:column;gap:.42rem;flex:1;}
        .d-vc-remove{width:100%;padding:.38rem;border:none;border-top:1px solid var(--border);background:none;color:var(--muted);font-size:.65rem;cursor:pointer;transition:all .12s;font-family:var(--sans);}
        .d-vc-remove:hover{background:#FFF5F5;color:#CC3333;}
        .d-vc-existing-tag{position:absolute;top:.35rem;left:.35rem;background:rgba(26,26,24,.7);color:white;font-size:.52rem;padding:.12rem .38rem;border-radius:2rem;}
        /* color picker in drawer */
        .d-cpw{display:flex;align-items:center;gap:.4rem;}
        .d-cp{width:32px;height:32px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--bg);flex-shrink:0;}
        .d-hex{flex:1;}
        .d-pat{flex-shrink:0;height:32px;padding:0 .45rem;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.82rem;transition:border-color .15s;}
        .d-pat:hover{border-color:var(--warm);}
        .d-pat.active{border-color:transparent;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c084fc);}
        /* toast */
        .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A18;color:white;padding:.7rem 1.4rem;border-radius:8px;font-size:.78rem;pointer-events:none;transition:transform .28s ease,opacity .28s ease;opacity:0;z-index:9999;}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    </style>
</head>
<body>
<header class="admin-header">
    <div class="header-left">
        <span class="header-wordmark">Selene Luxe</span>
        <span class="header-divider">·</span>
        <span class="header-subtitle">Manage Products</span>
    </div>
    <div class="header-right">
        <a href="pinterest-admin.html" class="header-link">← Pin Tool</a>
        <a href="add-product.html" class="header-link">+ Add Product</a>
        <div class="header-badge">Admin</div>
    </div>
</header>
<main>
    <div id="state-setup" class="status-screen">
        <div class="status-icon">🔑</div>
        <div class="status-title">One-time setup</div>
        <div class="status-body">Enter your GitHub token to load and manage products.</div>
        <div style="width:100%;max-width:420px;text-align:left;">
            <input type="password" id="token-input" class="setup-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            <button class="btn-primary" id="save-token-btn" style="width:100%;justify-content:center;">Save &amp; Load →</button>
        </div>
    </div>
    <div id="state-loading" class="status-screen"><div class="spinner"></div><div class="status-title">Loading products…</div></div>
    <div id="state-error" class="status-screen">
        <div class="status-icon">⚠️</div>
        <div class="status-title">Could not load</div>
        <div class="status-body" id="error-msg"></div>
        <button class="btn-primary" id="retry-btn">Try Again</button>
    </div>
    <div id="state-grid">
        <div class="grid-top">
            <h1 class="grid-title">All Products</h1>
            <div class="grid-meta">
                <span id="grid-count"></span>
                <button class="btn-secondary" id="reload-btn" style="padding:.4rem .9rem;font-size:.7rem;">↺ Refresh</button>
            </div>
        </div>
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="cosmetics">Beauty</button>
            <button class="filter-btn" data-cat="women">Women</button>
            <button class="filter-btn" data-cat="men">Men</button>
            <button class="filter-btn" data-cat="kids">Kids</button>
            <button class="filter-btn" data-cat="home">Home</button>
        </div>
        <div class="products-grid" id="products-grid"></div>
    </div>
</main>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-title">Remove this product?</div>
        <div class="modal-body">Permanently remove <strong id="modal-name"></strong> from your website. This cannot be undone.</div>
        <div class="modal-actions">
            <button class="btn-secondary" id="modal-cancel">Cancel</button>
            <button class="btn-danger" id="modal-confirm">Remove</button>
        </div>
    </div>
</div>

<!-- Edit drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="edit-drawer" id="edit-drawer">
    <div class="drawer-hd">
        <div class="drawer-title" id="drawer-title">Edit Product</div>
        <div class="drawer-hd-right">
            <button class="drawer-close-btn" id="drawer-close">✕</button>
        </div>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-ft">
        <button class="btn-primary" id="drawer-save">Save Changes →</button>
        <button class="btn-secondary" id="drawer-cancel">Cancel</button>
        <div class="drawer-spinner" id="drawer-spinner"></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script>
    const OWNER='selene-luxe',REPO='selene-luxe',BRANCH='main';
    const CAT_LABELS={cosmetics:'Beauty',women:"Women's",men:"Men's",kids:'Kids',home:'Home'};
    const LIVE='https://seleneluxe.fashion';
    const getToken=()=>localStorage.getItem('selene_gh_token');

    /* ── state ── */
    function showState(id){
        ['state-setup','state-loading','state-error'].forEach(s=>document.getElementById(s).classList.toggle('active',s===id));
        document.getElementById('state-grid').classList.toggle('active',id==='state-grid');
    }
    getToken()?(showState('state-loading'),loadProducts()):showState('state-setup');

    document.getElementById('save-token-btn').addEventListener('click',()=>{
        const v=document.getElementById('token-input').value.trim(); if(!v)return;
        localStorage.setItem('selene_gh_token',v); showState('state-loading'); loadProducts();
    });
    document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('save-token-btn').click();});
    document.getElementById('retry-btn').addEventListener('click',()=>{if(getToken()){showState('state-loading');loadProducts();}else showState('state-setup');});
    document.getElementById('reload-btn').addEventListener('click',()=>{showState('state-loading');loadProducts();});

    /* ── GitHub API ── */
    async function gh(path,method,body){
        const res=await fetch(`https://api.github.com${path}`,{method:method||'GET',headers:{Authorization:`Bearer ${getToken()}`,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})});
        if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.message||`GitHub ${res.status}`);}
        return res.json();
    }

    /* ── Load & render ── */
    let allProducts=[];
    async function loadProducts(){
        try{
            const f=await gh(`/repos/${OWNER}/${REPO}/contents/js/products.js`);
            const txt=new TextDecoder().decode(Uint8Array.from(atob(f.content.replace(/\n/g,'')),c=>c.charCodeAt(0)));
            allProducts=new Function(txt+'; return products;')();
            renderGrid(allProducts);
        }catch(err){
            if(/bad credential|401|unauthorized/i.test(err.message))localStorage.removeItem('selene_gh_token');
            document.getElementById('error-msg').textContent=err.message; showState('state-error');
        }
    }

    function renderGrid(products){
        const grid=document.getElementById('products-grid');
        grid.innerHTML='';
        products.forEach(p=>grid.appendChild(buildCard(p)));
        document.getElementById('grid-count').textContent=products.length+' products';
        showState('state-grid');
    }

    function buildCard(p){
        const img=p.image1||p.image2||'';
        const card=document.createElement('div');
        card.className='product-card'; card.dataset.id=p.id; card.dataset.cat=p.category;
        card.innerHTML=`
            <div class="card-img-wrap">
                ${img?`<img src="${img}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder>📦</div>'">`:'<div class="card-img-placeholder">📦</div>'}
                <span class="card-id-badge">#${p.id}</span>
                ${p.variants&&p.variants.length?`<span class="card-variant-badge">${p.variants.length} colors</span>`:''}
            </div>
            <div class="card-body">
                <div class="card-cat">${CAT_LABELS[p.category]||p.category}</div>
                <div class="card-brand">${p.brand}</div>
                <div class="card-name">${p.name}</div>
            </div>
            <div class="card-footer">
                <button class="edit-btn">Edit</button>
                <button class="delete-btn" data-id="${p.id}" data-name="${p.brand} ${p.name}">Remove</button>
            </div>`;
        card.querySelector('.edit-btn').addEventListener('click',()=>openEditDrawer(p));
        card.querySelector('.delete-btn').addEventListener('click',function(){openModal(this.dataset.id,this.dataset.name);});
        return card;
    }

    document.getElementById('filter-bar').addEventListener('click',e=>{
        const btn=e.target.closest('.filter-btn'); if(!btn)return;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
        const cat=btn.dataset.cat;
        document.querySelectorAll('.product-card').forEach(c=>c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none');
    });

    /* ── Delete modal ── */
    let pendingDeleteId=null;
    function openModal(id,name){pendingDeleteId=id;document.getElementById('modal-name').textContent=name;document.getElementById('modal').classList.add('open');}
    document.getElementById('modal-cancel').addEventListener('click',()=>{document.getElementById('modal').classList.remove('open');pendingDeleteId=null;});
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget){e.currentTarget.classList.remove('open');pendingDeleteId=null;}});
    document.getElementById('modal-confirm').addEventListener('click',async()=>{
        document.getElementById('modal').classList.remove('open');
        if(pendingDeleteId){await doDelete(pendingDeleteId);pendingDeleteId=null;}
    });

    async function doDelete(id){
        const card=document.querySelector(`.product-card[data-id="${id}"]`);
        if(card)card.classList.add('deleting');
        try{
            const f=await gh(`/repos/${OWNER}/${REPO}/contents/js/products.js`);
            const txt=decode(f.content);
            const updated=removeById(txt,parseInt(id));
            await gh(`/repos/${OWNER}/${REPO}/contents/js/products.js`,'PUT',{message:`Remove product #${id}`,content:encode(updated),sha:f.sha,branch:BRANCH});
            if(card)card.remove();
            document.getElementById('grid-count').textContent=document.querySelectorAll('.product-card').length+' products';
            toast(`Product #${id} removed — rebuilding in ~1 min`);
        }catch(err){if(card)card.classList.remove('deleting');toast('Error: '+err.message);}
    }

    /* ── Edit drawer ── */
    let editingProduct=null;
    let editVarFiles={};
    let editVarCounter=0;

    function openEditDrawer(p){
        editingProduct=p; editVarFiles={}; editVarCounter=0;
        document.getElementById('drawer-title').textContent='Edit #'+p.id+' — '+p.brand;
        buildDrawerBody(p);
        document.getElementById('drawer-overlay').classList.add('open');
        document.getElementById('edit-drawer').classList.add('open');
    }
    function closeDrawer(){
        document.getElementById('drawer-overlay').classList.remove('open');
        document.getElementById('edit-drawer').classList.remove('open');
    }
    document.getElementById('drawer-close').addEventListener('click',closeDrawer);
    document.getElementById('drawer-cancel').addEventListener('click',closeDrawer);
    document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);

    function buildDrawerBody(p){
        const body=document.getElementById('drawer-body');
        body.innerHTML=`
            <div class="d-section">Product Info</div>
            <div class="d-row">
                <div class="d-fg">
                    <label class="d-label">Category</label>
                    <select id="de-cat" class="d-select">
                        <option value="cosmetics"${p.category==='cosmetics'?' selected':''}>Beauty</option>
                        <option value="women"${p.category==='women'?' selected':''}>Women</option>
                        <option value="men"${p.category==='men'?' selected':''}>Men</option>
                        <option value="kids"${p.category==='kids'?' selected':''}>Kids</option>
                        <option value="home"${p.category==='home'?' selected':''}>Home</option>
                    </select>
                </div>
                <div class="d-fg">
                    <label class="d-label">Price</label>
                    <input type="text" id="de-price" class="d-input" value="${esc(p.price||'')}">
                </div>
            </div>
            <div class="d-fg">
                <label class="d-label">Brand</label>
                <input type="text" id="de-brand" class="d-input" value="${esc(p.brand)}">
            </div>
            <div class="d-fg">
                <label class="d-label">Product Name</label>
                <input type="text" id="de-name" class="d-input" value="${esc(p.name)}">
            </div>
            <div class="d-fg">
                <label class="d-label">Description</label>
                <textarea id="de-desc" class="d-textarea">${esc(p.description)}</textarea>
            </div>
            <div class="d-row">
                <div class="d-fg">
                    <label class="d-label">Badge</label>
                    <input type="text" id="de-badge" class="d-input" value="${esc(p.badge||'')}">
                </div>
                <div class="d-fg">
                    <label class="d-label">Trending</label>
                    <input type="text" id="de-trending" class="d-input" value="${esc(p.trending||'')}">
                </div>
            </div>
            <div class="d-fg">
                <label class="d-label">Affiliate Link</label>
                <input type="url" id="de-link" class="d-input" value="${esc(p.affiliateLink)}">
            </div>
            <div class="d-fg">
                <label class="d-label">Button Text</label>
                <input type="text" id="de-btn" class="d-input" value="${esc(p.buttonText||'Check Availability on Amazon')}">
            </div>

            <div class="d-section" style="margin-top:.5rem;">Color Variants</div>
            <div class="d-bulk-drop" id="de-bulk-drop">
                📁 <strong>Drop new variant images here</strong> — or click to browse
            </div>
            <input type="file" id="de-bulk-input" accept="image/*" multiple style="display:none">
            <div id="de-variant-cards" class="d-variant-cards"></div>
        `;

        /* Populate existing variants */
        if(p.variants&&p.variants.length){
            p.variants.forEach(v=>addDrawerVariantCard(null,v));
        }

        /* Bulk drop events */
        const bulkDrop=body.querySelector('#de-bulk-drop');
        const bulkInput=body.querySelector('#de-bulk-input');
        bulkDrop.addEventListener('click',()=>bulkInput.click());
        bulkDrop.addEventListener('dragover',e=>{e.preventDefault();bulkDrop.classList.add('drag-over');});
        bulkDrop.addEventListener('dragleave',()=>bulkDrop.classList.remove('drag-over'));
        bulkDrop.addEventListener('drop',e=>{
            e.preventDefault();bulkDrop.classList.remove('drag-over');
            if(e.dataTransfer.files.length)Array.from(e.dataTransfer.files).forEach(f=>addDrawerVariantCard(f,null));
        });
        bulkInput.addEventListener('change',e=>{
            if(e.target.files.length){Array.from(e.target.files).forEach(f=>addDrawerVariantCard(f,null));e.target.value='';}
        });
    }

    function addDrawerVariantCard(file,existing){
        editVarCounter++;
        const idx=editVarCounter;
        const isNew=!existing;
        const container=document.getElementById('de-variant-cards');
        const card=document.createElement('div');
        card.className='d-vc'; card.dataset.idx=idx; card.dataset.existing=existing?'1':'';

        const imgSrc=existing?`${LIVE}/${existing.image}`:'';

        card.innerHTML=`
            <div class="d-vc-thumb">
                ${existing?`<img src="${imgSrc}" onerror="this.style.display='none'">`:''}
                ${!existing?`<div class="d-vc-empty"><span style="font-size:1.4rem">📁</span><span>Upload image</span></div>`:''}
                <div class="d-vc-hint">${existing?'Click to replace image':'Click or drop to upload'}</div>
                ${existing?`<span class="d-vc-existing-tag">existing</span>`:''}
                <input type="file" class="dvc-file" accept="image/*" style="display:none">
            </div>
            <div class="d-vc-fields">
                <input type="text" class="d-input dvc-name" placeholder="Color name" value="${esc(existing?existing.color:'')}">
                <div class="d-cpw">
                    <input type="color" class="d-cp dvc-picker" value="${existing&&existing.colorCode!=='multicolor'?existing.colorCode:'#C4956A'}">
                    <input type="text" class="d-input d-hex dvc-code" value="${esc(existing?existing.colorCode:'#C4956A')}" placeholder="#C4956A">
                    <button type="button" class="d-pat dvc-pat" title="Pattern/Multicolor">🌈</button>
                </div>
                <input type="text" class="d-input dvc-fn" placeholder="filename.jpg" value="${esc(existing?existing.image.replace('images/',''):'')}">
            </div>
            <button type="button" class="d-vc-remove">✕ Remove</button>
        `;

        const thumb=card.querySelector('.d-vc-thumb');
        const fileInput=card.querySelector('.dvc-file');
        const fnInput=card.querySelector('.dvc-fn');
        const nameInput=card.querySelector('.dvc-name');
        const picker=card.querySelector('.dvc-picker');
        const hexInput=card.querySelector('.dvc-code');
        const patBtn=card.querySelector('.dvc-pat');

        /* Show multicolor state if existing */
        if(existing&&existing.colorCode==='multicolor'){
            hexInput.readOnly=true; hexInput.style.color='transparent';
            hexInput.style.background='linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c084fc)';
            picker.style.opacity='0.25'; picker.style.pointerEvents='none'; patBtn.classList.add('active');
        }

        function loadFile(f){
            editVarFiles[idx]=f;
            const reader=new FileReader();
            reader.onload=e=>{
                let img=thumb.querySelector('img');
                if(!img){img=document.createElement('img');thumb.prepend(img);}
                img.src=e.target.result; img.style.display='block';
                const empty=thumb.querySelector('.d-vc-empty'); if(empty)empty.style.display='none';
                card.dataset.existing='0';
            };
            reader.readAsDataURL(f);
            if(!fnInput.dataset.edited){
                const ext=f.name.split('.').pop().toLowerCase();
                const base=document.getElementById('de-name').value.trim();
                fnInput.value=dSlug(base+'-'+(nameInput.value.trim()||'variant-'+idx))+'.'+ext;
            }
        }

        thumb.addEventListener('click',()=>fileInput.click());
        thumb.addEventListener('dragover',e=>{e.preventDefault();thumb.style.outline='2px dashed var(--warm)';});
        thumb.addEventListener('dragleave',()=>thumb.style.outline='');
        thumb.addEventListener('drop',e=>{e.preventDefault();thumb.style.outline='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
        fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
        if(file)loadFile(file);

        picker.addEventListener('input',()=>{hexInput.value=picker.value;});
        hexInput.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(hexInput.value))picker.value=hexInput.value;});
        nameInput.addEventListener('input',()=>{
            if(!fnInput.dataset.edited&&editVarFiles[idx]){
                const ext=editVarFiles[idx].name.split('.').pop().toLowerCase();
                const base=document.getElementById('de-name').value.trim();
                fnInput.value=dSlug(base+'-'+(nameInput.value.trim()||'variant-'+idx))+'.'+ext;
            }
        });
        fnInput.addEventListener('input',function(){this.dataset.edited='1';});

        let isMulti=existing&&existing.colorCode==='multicolor';
        patBtn.addEventListener('click',()=>{
            isMulti=!isMulti;
            if(isMulti){
                hexInput.value='multicolor';hexInput.readOnly=true;hexInput.style.color='transparent';
                hexInput.style.background='linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c084fc)';
                picker.style.opacity='0.25';picker.style.pointerEvents='none';patBtn.classList.add('active');
            }else{
                hexInput.value='#C4956A';hexInput.readOnly=false;hexInput.style.color='';hexInput.style.background='';
                picker.style.opacity='';picker.style.pointerEvents='';patBtn.classList.remove('active');
            }
        });

        card.querySelector('.d-vc-remove').addEventListener('click',()=>{delete editVarFiles[idx];card.remove();});
        container.appendChild(card);
    }

    /* ── Save edits ── */
    document.getElementById('drawer-save').addEventListener('click',async()=>{
        const spin=document.getElementById('drawer-spinner');
        spin.style.display='block';
        document.getElementById('drawer-save').disabled=true;
        const card=document.querySelector(`.product-card[data-id="${editingProduct.id}"]`);
        if(card)card.classList.add('saving');
        try{
            const p=editingProduct;
            const cat=document.getElementById('de-cat').value;
            const updated={
                id:p.id, category:cat,
                type:['cosmetics','home'].includes(cat)?'lifestyle':'fashion',
                brand:document.getElementById('de-brand').value.trim(),
                name:document.getElementById('de-name').value.trim(),
                description:document.getElementById('de-desc').value.trim(),
                price:document.getElementById('de-price').value.trim()||undefined,
                badge:document.getElementById('de-badge').value.trim()||undefined,
                trending:document.getElementById('de-trending').value.trim()||undefined,
                image1:p.image1, image2:p.image2,
                affiliateLink:document.getElementById('de-link').value.trim(),
                buttonText:document.getElementById('de-btn').value.trim()
            };

            /* Collect variants */
            const varCards=document.querySelectorAll('.d-vc');
            const variants=[];
            varCards.forEach(vc=>{
                const name=vc.querySelector('.dvc-name').value.trim();
                const code=vc.querySelector('.dvc-code').value.trim();
                const fn=vc.querySelector('.dvc-fn').value.trim();
                if(name&&fn)variants.push({color:name,colorCode:code==='multicolor'?'multicolor':(/^#[0-9a-fA-F]{6}$/.test(code)?code:'#000000'),imageFile:fn});
            });
            if(variants.length)updated.variants=variants;

            /* Upload any new variant images */
            for(const[idxStr,vf]of Object.entries(editVarFiles)){
                const vc=document.querySelector(`.d-vc[data-idx="${idxStr}"]`);
                if(!vc)continue;
                const fn=vc.querySelector('.dvc-fn').value.trim();
                if(!fn)continue;
                const blob=await compressImg(vf);
                const b64=await toB64(blob);
                let sha;
                try{const ex=await gh(`/repos/${OWNER}/${REPO}/contents/images/${fn}`);sha=ex.sha;}catch(_){}
                await gh(`/repos/${OWNER}/${REPO}/contents/images/${fn}`,'PUT',{message:`Update variant image: ${fn}`,content:b64,branch:BRANCH,...(sha?{sha}:{})});
            }

            /* Build new entry string and replace in products.js */
            const newEntry=buildEntry(updated,p.id,p.image1.replace('images/',''));
            const f=await gh(`/repos/${OWNER}/${REPO}/contents/js/products.js`);
            const txt=decode(f.content);
            const newTxt=replaceById(txt,p.id,newEntry);
            await gh(`/repos/${OWNER}/${REPO}/contents/js/products.js`,'PUT',{message:`Edit product #${p.id}: ${updated.brand} – ${updated.name}`,content:encode(newTxt),sha:f.sha,branch:BRANCH});

            /* Update card display */
            if(card){
                card.querySelector('.card-brand').textContent=updated.brand;
                card.querySelector('.card-name').textContent=updated.name;
                card.querySelector('.card-cat').textContent=CAT_LABELS[updated.category]||updated.category;
                card.dataset.cat=updated.category;
                const vBadge=card.querySelector('.card-variant-badge');
                if(variants.length){
                    if(vBadge)vBadge.textContent=variants.length+' colors';
                    else{const s=document.createElement('span');s.className='card-variant-badge';s.textContent=variants.length+' colors';card.querySelector('.card-img-wrap').appendChild(s);}
                }else if(vBadge)vBadge.remove();
                card.classList.remove('saving');
            }

            /* Update in-memory product */
            const idx=allProducts.findIndex(x=>x.id===p.id);
            if(idx!==-1)allProducts[idx]={...updated,variants:variants.length?variants.map(v=>({color:v.color,colorCode:v.colorCode,image:'images/'+v.imageFile})):undefined};

            closeDrawer();
            toast('✓ Product #'+p.id+' updated — rebuilding in ~1 min');
        }catch(err){
            if(card)card.classList.remove('saving');
            toast('Error: '+err.message);
        }finally{
            spin.style.display='none';
            document.getElementById('drawer-save').disabled=false;
        }
    });

    /* ── Helpers ── */
    function decode(b64){return new TextDecoder().decode(Uint8Array.from(atob(b64.replace(/\n/g,'')),c=>c.charCodeAt(0)));}
    function encode(txt){return btoa(String.fromCharCode(...new TextEncoder().encode(txt)));}
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
    function q(s){return String(s||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');}
    function dSlug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,38);}

    function buildEntry(p,id,imgFile){
        const type=['cosmetics','home'].includes(p.category)?'lifestyle':'fashion';
        const lines=[
            `    {`,`        id: ${id},`,`        category: "${p.category}",`,`        type: "${type}",`,
            `        brand: "${q(p.brand)}",`,`        name: "${q(p.name)}",`,`        description: "${q(p.description)}",`
        ];
        if(p.price)lines.push(`        price: "${q(p.price)}",`);
        if(p.badge)lines.push(`        badge: "${q(p.badge)}",`);
        if(p.trending)lines.push(`        trending: "${q(p.trending)}",`);
        const hasV=p.variants&&p.variants.length>0;
        lines.push(`        image1: "images/${imgFile}",`,`        image2: "images/${imgFile}",`,
            `        affiliateLink: "${q(p.affiliateLink)}",`,`        buttonText: "${q(p.buttonText)}"${hasV?',':''}`);
        if(hasV){
            const vl=p.variants.map(v=>`            { color: "${q(v.color)}", colorCode: "${q(v.colorCode)}", image: "images/${v.imageFile}" }`);
            lines.push(`        variants: [`,vl.join(',\n'),`        ]`);
        }
        lines.push(`    },`);
        return lines.join('\n');
    }

    function removeById(content,id){
        const lines=content.split('\n');
        const idx=lines.findIndex(l=>new RegExp(`\\bid\\s*:\\s*${id},`).test(l));
        if(idx===-1)throw new Error(`Product #${id} not found`);
        let start=idx-1;
        while(start>=0&&lines[start].trim()!=='{')start--;
        let end=idx+1;
        while(end<lines.length&&lines[end].trim()!=='},')end++;
        return[...lines.slice(0,start),...lines.slice(end+1)].join('\n');
    }

    function replaceById(content,id,newEntry){
        const lines=content.split('\n');
        const idx=lines.findIndex(l=>new RegExp(`\\bid\\s*:\\s*${id},`).test(l));
        if(idx===-1)throw new Error(`Product #${id} not found`);
        let start=idx-1;
        while(start>=0&&lines[start].trim()!=='{')start--;
        let end=idx+1;
        while(end<lines.length&&lines[end].trim()!=='},')end++;
        return[...lines.slice(0,start),newEntry,...lines.slice(end+1)].join('\n');
    }

    async function compressImg(file){
        return new Promise(resolve=>{
            const img=new Image(),url=URL.createObjectURL(file);
            img.onload=()=>{
                URL.revokeObjectURL(url);
                const max=1200,scale=Math.min(1,max/Math.max(img.width,img.height));
                const c=document.createElement('canvas');
                c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                c.toBlob(b=>resolve(b),'image/jpeg',0.82);
            };
            img.src=url;
        });
    }
    async function toB64(blob){
        return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});
    }

    let toastTimer;
    function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3800);}
</script>
