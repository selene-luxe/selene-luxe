        .outfit-details-layout {
            padding-top: 2rem;
            padding-bottom: 5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 5rem;
        }
        
        .outfit-hero-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }
        @media(min-width: 768px) {
            .outfit-hero-grid {

                gap: 5rem;
            }

        .outfit-hero-image {
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--surface);
        }
        .outfit-hero-image img,
        .outfit-hero-image video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .outfit-hero-info h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }
        .outfit-hero-info p.desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 3rem;
        }
        .outfit-hero-info .meta {
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        .outfit-hero-info .meta p.tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .outfit-hero-info .meta p.sub {
            font-size: 0.8rem;
            font-style: italic;
            color: #999;
        }

        .items-section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            row-gap: 3rem;
        }
        @media(min-width: 768px) {
            .items-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 2rem;
            }
        }

        .product-card {
            display: block;
            cursor: pointer;
        }
        .product-image-container {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: #FAFAFA;
            margin-bottom: 1rem;
        }
        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s var(--transition-smooth);
        }
        .product-card:hover .product-image-container img {
            transform: scale(1.05);
        }
        .product-inspiration {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
        }
        .product-brand {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .product-name {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            line-height: 1.3;
            margin: 0.2rem 0;
        }
        .product-action {
            font-size: 0.65rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
        }

        @media (max-width: 767px) {
            .outfit-details-layout {
                padding-top: 5rem;
                padding-bottom: 1rem;
                margin-bottom: 1.5rem;
            }
            .outfit-hero-image {
                aspect-ratio: unset;
                height: 45vh;
            }
            .outfit-hero-info h1 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }
            .outfit-hero-info p.desc {
                display: none;
            }
            .outfit-hero-info .meta {
                display: none;
            }
            .items-section-title {
                margin-bottom: 1.5rem;
            }
        }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sideMenu = document.getElementById('side-menu');
            const menuBtn = document.getElementById('menu-btn');
            const closeMenuBtn = document.getElementById('close-menu');
            
            if (menuBtn && sideMenu) {
                menuBtn.addEventListener('click', () => {
                    sideMenu.style.pointerEvents = 'auto';
                    sideMenu.style.transform = 'translateX(0)';
                });
                closeMenuBtn.addEventListener('click', () => {
                    sideMenu.style.transform = 'translateX(-100%)';
                });
            }

            const urlParams = new URLSearchParams(window.location.search);
            const outfitID = urlParams.get('id');

            if (outfitID && typeof outfits !== 'undefined') {
                const outfit = outfits.find(o => o.id === outfitID);
                const outfitHero = document.getElementById('outfit-hero');
                const itemsGrid = document.getElementById('outfit-items-grid');

                if (outfit) {
                    document.title = `Selene Luxe | ${outfit.name}`;
                    
                    // Load Hero
                    const heroMedia = outfit.heroVideo
                        ? `<video autoplay muted loop playsinline preload="none" poster="${outfit.heroImage}" style="width:100%;height:100%;object-fit:cover;"><source src="${outfit.heroVideo}" type="video/mp4"></video>`
                        : `<img src="${outfit.heroImage}" alt="${outfit.name}" loading="lazy">`;
                    outfitHero.innerHTML = `
                        <div class="outfit-hero-grid">
                            <div class="outfit-hero-image">
                                ${heroMedia}
                            </div>
                            <div class="outfit-hero-info">
                                <h1 class="italic">${outfit.name}</h1>
                                <p class="desc">${outfit.description}</p>
                                <div class="meta">
                                    <p class="tag">Curated Collection</p>
                                    <p class="sub">Discover each piece below to complete the look.</p>
                                </div>
                            </div>
                        </div>
                    `;

                    // Load Items
                    const matchesOutfit = (p, id) => Array.isArray(p.outfitId) ? p.outfitId.includes(id) : p.outfitId === id;
                    const outfitItems = products.filter(p => matchesOutfit(p, outfitID));
                    outfitItems.forEach(p => {
                        itemsGrid.innerHTML += `
                            <a href="product.html?id=${p.id}" class="product-card">
                                <div class="product-image-container">
                                    <img src="${p.image1}" alt="${p.name}" loading="lazy">
                                    <p class="product-inspiration">Style Inspiration</p>
                                </div>
                                <div>
                                    <p class="product-brand">${p.brand}</p>
                                    <h2 class="product-name">${p.name}</h2>
                                    <p class="product-action">Check Price</p>
                                </div>
                            </a>
                        `;
                    });
                }
            }
        });
    </script>
