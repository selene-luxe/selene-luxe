<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELENE LUXE | Outfit Details</title>
    <meta property="og:type" content="article" />
    <meta property="og:title" content="The Birmingham Edit" />
    <meta property="og:description" content="Shop the exact Amazon matches for this viral dark academia look. Curated men's vintage style." />
    <meta property="og:url" content="https://selene-luxe.pages.dev/outfit-details?id=birmingham-edit" />
    <meta property="og:site_name" content="SELENE LUXE" />
    <meta property="og:image" content="https://selene-luxe.pages.dev/images/outfit1.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .zara-logo { 
            letter-spacing: -0.05em; 
            font-weight: 900; 
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            word-spacing: 0.2em;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="antialiased">

    <!-- GLOBAL HEADER -->
    <header class="fixed top-0 w-full flex justify-between items-center px-6 md:px-12 py-6 z-50 transition-all duration-500" id="main-header">
        <div class="flex items-center w-1/4">
            <button id="menu-btn" class="hover:opacity-50 transition flex items-center gap-2 p-2">
                <i data-feather="menu" class="w-5 h-5"></i>
                <span class="text-[10px] uppercase tracking-widest font-bold hidden md:block">Menu</span>
            </button>
        </div>
        <div class="flex justify-center w-1/2 md:w-1/3">
            <a href="index.html" class="text-4xl md:text-6xl zara-logo transition-all duration-500" id="header-logo">SELENE&nbsp;LUXE</a>
        </div>
        <div class="flex items-center justify-end gap-3 md:gap-6 w-1/4">
            <button id="search-btn" class="hover:opacity-50 transition flex items-center gap-2 p-2">
                <span class="text-[10px] uppercase tracking-widest font-bold hidden md:block">Search</span>
                <i data-feather="search" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
            <a href="wishlist.html" class="hover:opacity-50 transition p-2">
                <i data-feather="heart" class="w-4 h-4 md:w-5 md:h-5"></i>
            </a>
        </div>
    </header>

    <main class="pt-32 md:pt-48 pb-20 px-6 md:px-12 max-w-[1800px] mx-auto">
        <!-- OUTFIT HERO SECTION -->
        <div id="outfit-hero" class="mb-24 md:mb-32">
            <!-- Loaded dynamically -->
        </div>

        <!-- ITEMS IN THIS OUTFIT -->
        <div class="mb-12">
            <h2 class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-8">Shop the items</h2>
            <div id="outfit-items-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </main>

    <!-- OVERLAYS -->
    <div id="side-menu" class="fixed top-0 left-0 w-full md:w-[400px] h-full bg-white z-[100] transform -translate-x-full transition-transform duration-500 p-10 shadow-2xl flex flex-col">
        <button id="close-menu" class="self-end mb-10 hover:rotate-90 transition-transform duration-300">
            <i data-feather="x" class="w-6 h-6"></i>
        </button>
        <nav class="flex flex-col gap-8 text-2xl font-serif italic">
            <a href="shop.html?cat=women" class="hover:pl-4 transition-all">Women</a>
            <a href="shop.html?cat=men" class="hover:pl-4 transition-all">Men</a>
            <a href="shop.html?cat=kids" class="hover:pl-4 transition-all">Kids</a>
            <a href="outfits.html" class="hover:pl-4 transition-all border-t border-gray-100 pt-8 mt-4">Outfits</a>
        </nav>
        <div class="mt-auto pt-10 border-t border-gray-100 text-[10px] uppercase tracking-widest font-bold text-gray-400 flex flex-col gap-4">
            <a href="about.html">About Us</a>
            <a href="disclosure.html">Affiliate Disclosure</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>

    <div id="search-overlay" class="fixed inset-0 bg-white z-[110] hidden flex flex-col items-center justify-center p-6 opacity-0 transition-opacity duration-500">
        <button id="close-search" class="absolute top-10 right-10 hover:rotate-90 transition-transform duration-300">
            <i data-feather="x" class="w-8 h-8"></i>
        </button>
        <div class="w-full max-w-2xl">
            <input id="search-input" type="text" placeholder="SEARCH" class="w-full text-4xl md:text-6xl font-serif italic border-b border-black focus:outline-none pb-4 uppercase">
        </div>
    </div>

    <footer class="py-20 bg-white border-t border-gray-50">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-10">
                As an Amazon Associate I earn from qualifying purchases.
            </p>
            <div class="flex justify-center gap-10 text-[10px] uppercase tracking-widest font-bold text-neutral-400">
                <a href="privacy.html" class="hover:text-black transition">Privacy</a>
                <a href="disclosure.html" class="hover:text-black transition">Disclosure</a>
                <a href="about.html" class="hover:text-black transition">About</a>
            </div>
            <p class="mt-16 text-[9px] text-gray-300 uppercase tracking-[0.5em]">
                © 2024 SELENE LUXE CURATED
            </p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const outfitID = urlParams.get('id');

        if (outfitID && typeof outfits !== 'undefined') {
            const outfit = outfits.find(o => o.id === outfitID);
            const outfitHero = document.getElementById('outfit-hero');
            const itemsGrid = document.getElementById('outfit-items-grid');

            if (outfit) {
                // Load Hero
                outfitHero.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
                        <div class="md:col-span-7">
                            <div class="aspect-[3/4] overflow-hidden bg-gray-50">
                                <img src="${outfit.heroImage}" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="md:col-span-5 space-y-8">
                            <h1 class="text-5xl md:text-7xl font-serif italic tracking-tighter">${outfit.name}</h1>
                            <p class="text-neutral-500 font-light leading-relaxed text-lg">${outfit.description}</p>
                            <div class="pt-8 border-t border-gray-100">
                                <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-4">Curated Collection</p>
                                <p class="text-xs italic text-neutral-400">Discover each piece below to complete the look.</p>
                            </div>
                        </div>
                    </div>
                `;

                // Load Items
                const outfitItems = products.filter(p => p.outfitId === outfitID);
                outfitItems.forEach(p => {
                    itemsGrid.innerHTML += `
                        <a href="product.html?id=${p.id}" class="group block">
                            <div class="aspect-[3/4] overflow-hidden mb-6 bg-gray-50 relative">
                                <img src="${p.image1}" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                                <p class="absolute bottom-4 left-4 text-[7px] text-white/70 uppercase tracking-widest font-bold">Style Inspiration</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[9px] text-gray-400 uppercase tracking-widest">${p.brand}</p>
                                <h2 class="text-sm font-medium tracking-tight text-neutral-800">${p.name}</h2>
                                <p class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest pt-1">Check Price</p>
                            </div>
                        </a>
                    `;
                });
            }
        }
        feather.replace();
    </script>
</body>
</html>
